<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog – Berlin Joven</title>
    <meta name="description" content="Historias, curiosidades y guías de Berlín en español. Por Berlin Joven.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>

        /* ══════════════════════════════════════════════════════════
           DESIGN SYSTEM — identical to main site
        ══════════════════════════════════════════════════════════ */
        :root {
            --bg:      #08080F;
            --surface: #0E0E1B;
            --surface2:#141424;
            --surface3:#1C1C2E;
            --border:  #20203A;
            --border2: #2C2C48;
            --text:    #EEEEF8;
            --text2:   #7A7AA0;
            --text3:   #44446A;
            --red:     #E04030;
            --gold:    #C9A050;
            --green:   #22C55E;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body { font-family:'Inter',sans-serif; color:var(--text); background:var(--bg); -webkit-font-smoothing:antialiased; }
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:var(--bg); }
        ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }

        /* ══════════════════════════════════════════════════════════
           NAV
        ══════════════════════════════════════════════════════════ */
        nav {
            position:sticky; top:0; z-index:100;
            background:rgba(8,8,15,0.85);
            backdrop-filter:blur(16px);
            -webkit-backdrop-filter:blur(16px);
            border-bottom:1px solid var(--border);
            padding:0 52px; height:58px;
            display:flex; align-items:center; justify-content:space-between;
        }
        .nav-brand {
            font-family:'Oswald',sans-serif; font-size:17px; font-weight:700;
            letter-spacing:3px; text-transform:uppercase;
            text-decoration:none; color:var(--text);
        }
        .nav-brand span { color:var(--red); }
        .nav-right { display:flex; align-items:center; gap:24px; }
        .nav-back {
            font-size:12px; color:var(--text2); text-decoration:none;
            letter-spacing:1px; text-transform:uppercase;
            transition:color 0.2s; display:flex; align-items:center; gap:6px;
        }
        .nav-back:hover { color:var(--text); }
        .nav-back svg { flex-shrink:0; }

        /* Hamburger */
        .nav-hamburger {
            display:none; flex-direction:column; justify-content:center;
            gap:5px; cursor:pointer; background:none; border:none; padding:8px 4px;
        }
        .nav-hamburger span {
            display:block; width:22px; height:2px; background:var(--text2);
            transition:transform 0.25s ease, opacity 0.2s ease, background 0.2s;
        }
        .nav-hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); background:var(--text); }
        .nav-hamburger.open span:nth-child(2) { opacity:0; }
        .nav-hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); background:var(--text); }

        /* ══════════════════════════════════════════════════════════
           HERO
        ══════════════════════════════════════════════════════════ */
        .blog-hero {
            padding:80px 52px 64px;
            border-bottom:1px solid var(--border);
            background:
                radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,160,80,0.07) 0%, transparent 70%),
                var(--bg);
        }
        .blog-tag {
            font-size:11px; font-weight:600; letter-spacing:3px;
            text-transform:uppercase; color:var(--gold);
            margin-bottom:16px;
            opacity:0; animation:fadeUpEl 0.5s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
        }
        .blog-hero h1 {
            font-family:'Oswald',sans-serif;
            font-size:clamp(36px, 5.5vw, 52px);
            font-weight:700; letter-spacing:-0.5px; line-height:1.05; margin-bottom:16px;
            opacity:0; animation:fadeUpEl 0.6s cubic-bezier(0.22,1,0.36,1) 0.25s forwards;
        }
        .blog-hero p {
            font-size:16px; color:var(--text2); max-width:500px; line-height:1.7;
            opacity:0; animation:fadeUpEl 0.55s cubic-bezier(0.22,1,0.36,1) 0.4s forwards;
        }

        @keyframes fadeUpEl {
            0%   { opacity:0; transform:translateY(22px); }
            100% { opacity:1; transform:none; }
        }

        /* ══════════════════════════════════════════════════════════
           FILTER TABS
        ══════════════════════════════════════════════════════════ */
        .filter-bar {
            padding:0 52px;
            border-bottom:1px solid var(--border);
            display:flex; gap:0; overflow-x:auto;
            -ms-overflow-style:none; scrollbar-width:none;
        }
        .filter-bar::-webkit-scrollbar { display:none; }
        .filter-btn {
            font-size:12px; letter-spacing:1px; text-transform:uppercase;
            color:var(--text3); background:none; border:none; cursor:pointer;
            padding:16px 20px; border-bottom:2px solid transparent;
            transition:color 0.2s, border-color 0.2s;
            white-space:nowrap; font-family:'Inter',sans-serif;
        }
        .filter-btn:hover { color:var(--text2); }
        .filter-btn.active { color:var(--gold); border-bottom-color:var(--gold); }

        /* ══════════════════════════════════════════════════════════
           POSTS GRID
        ══════════════════════════════════════════════════════════ */
        .posts-section { padding:64px 52px; max-width:1100px; margin:0 auto; }
        .posts-grid {
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(300px,1fr));
            gap:1px; background:var(--border);
        }
        .post-card {
            background:var(--bg); padding:36px 32px;
            cursor:pointer; transition:background 0.2s;
            display:flex; flex-direction:column;
        }
        .post-card:hover { background:var(--surface); }
        .post-cat {
            font-size:10px; letter-spacing:2px; text-transform:uppercase;
            color:var(--gold); margin-bottom:14px;
            display:flex; align-items:center; gap:8px;
        }
        .post-cat::before {
            content:''; display:block;
            width:20px; height:1px; background:var(--gold);
        }
        .post-title {
            font-family:'Oswald',sans-serif; font-size:22px; font-weight:600;
            line-height:1.2; margin-bottom:12px; letter-spacing:0.2px;
        }
        .post-excerpt {
            font-size:13.5px; color:var(--text2); line-height:1.7;
            flex:1; margin-bottom:24px;
        }
        .post-meta {
            display:flex; align-items:center; justify-content:space-between;
            font-size:11px; color:var(--text3); letter-spacing:0.5px;
        }
        .post-read {
            font-size:11px; color:var(--text3); letter-spacing:1px;
            text-transform:uppercase;
            display:flex; align-items:center; gap:5px;
            transition:color 0.2s;
        }
        .post-card:hover .post-read { color:var(--gold); }

        /* ══════════════════════════════════════════════════════════
           FULL POST VIEW
        ══════════════════════════════════════════════════════════ */
        .post-view { display:none; padding:64px 52px; max-width:740px; margin:0 auto; }
        .post-view.visible { display:block; }
        .posts-section.hidden { display:none; }

        .post-view-back {
            font-size:12px; color:var(--text2); text-decoration:none; cursor:pointer;
            letter-spacing:1px; text-transform:uppercase;
            display:inline-flex; align-items:center; gap:6px;
            margin-bottom:40px; background:none; border:none;
            transition:color 0.2s;
        }
        .post-view-back:hover { color:var(--text); }

        .post-view-cat {
            font-size:10px; letter-spacing:2px; text-transform:uppercase;
            color:var(--gold); margin-bottom:14px;
        }
        .post-view h1 {
            font-family:'Oswald',sans-serif;
            font-size:clamp(30px, 4.5vw, 42px);
            font-weight:700; letter-spacing:-0.3px; line-height:1.1; margin-bottom:16px;
        }
        .post-view-meta {
            font-size:12px; color:var(--text3); letter-spacing:0.5px;
            margin-bottom:48px; padding-bottom:32px;
            border-bottom:1px solid var(--border);
        }
        .post-view-body { font-size:16px; color:var(--text2); line-height:1.85; }
        .post-view-body p { margin-bottom:20px; }
        .post-view-body h2 {
            font-family:'Oswald',sans-serif; font-size:24px; font-weight:600;
            color:var(--text); margin:40px 0 16px; letter-spacing:0.2px;
        }
        .post-view-body h3 {
            font-family:'Oswald',sans-serif; font-size:18px; font-weight:500;
            color:var(--text); margin:28px 0 10px;
        }
        .post-view-body strong { color:var(--text); font-weight:600; }
        .post-view-body em { color:var(--gold); font-style:normal; }
        .post-view-body blockquote {
            border-left:3px solid var(--gold); padding:16px 20px;
            background:var(--surface); margin:28px 0; border-radius:0 4px 4px 0;
            font-style:italic; color:var(--text2);
            position:relative;
        }

        /* ══════════════════════════════════════════════════════════
           FOOTER
        ══════════════════════════════════════════════════════════ */
        footer {
            background:var(--surface); border-top:1px solid var(--border);
            padding:36px 52px; text-align:center;
        }
        .footer-brand {
            font-family:'Oswald',sans-serif; font-size:16px; font-weight:700;
            letter-spacing:3px; text-transform:uppercase; color:var(--text);
            margin-bottom:12px;
        }
        .footer-brand span { color:var(--red); }
        .footer-copy { font-size:11px; color:var(--text3); letter-spacing:1px; }

        /* ══════════════════════════════════════════════════════════
           FADE-UP ON SCROLL
        ══════════════════════════════════════════════════════════ */
        .js-ready .fade-up {
            opacity:0; transform:translateY(24px);
            transition:opacity 0.55s cubic-bezier(0.22,1,0.36,1),
                        transform 0.55s cubic-bezier(0.22,1,0.36,1);
        }
        .js-ready .fade-up.is-visible { opacity:1; transform:none; }

        /* ══════════════════════════════════════════════════════════
           RESPONSIVE
        ══════════════════════════════════════════════════════════ */
        @media (max-width:768px) {
            nav { padding:0 20px; }
            .nav-right .nav-back { display:none; }
            .nav-hamburger { display:flex; }

            /* Mobile nav drawer */
            .nav-mobile-links {
                display:none;
                position:fixed; top:58px; left:0; right:0;
                background:rgba(8,8,15,0.97);
                backdrop-filter:blur(20px);
                -webkit-backdrop-filter:blur(20px);
                border-bottom:1px solid var(--border);
                flex-direction:column; z-index:99;
                padding:4px 0 16px;
            }
            .nav-mobile-links.open { display:flex; }
            .nav-mobile-links a {
                display:block; padding:15px 24px;
                font-size:13px; letter-spacing:1px; text-transform:uppercase;
                color:var(--text2); text-decoration:none;
                border-bottom:1px solid var(--border);
                transition:color 0.2s;
            }
            .nav-mobile-links a:hover { color:var(--text); }

            .blog-hero { padding:52px 24px 44px; }
            .filter-bar { padding:0 20px; }
            .posts-section { padding:44px 0; }
            .post-view { padding:44px 24px; }
            footer { padding:32px 24px; }
        }

        /* ══════════════════════════════════════════════════════════
           REDUCED MOTION
        ══════════════════════════════════════════════════════════ */
        @media (prefers-reduced-motion:reduce) {
            .blog-tag, .blog-hero h1, .blog-hero p { opacity:1 !important; animation:none !important; }
            .js-ready .fade-up { opacity:1 !important; transform:none !important; transition:none !important; }
        }

    </style>
</head>
<body>

<!-- ═══ NAV ══════════════════════════════════════════════════════════ -->
<nav>
    <a href="/" class="nav-brand">Berlin <span>Joven</span>©</a>
    <div class="nav-right">
        <button class="nav-hamburger" id="navHamburger" aria-label="Abrir menú" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
        <a href="/" class="nav-back">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            Volver a los tours
        </a>
    </div>
</nav>

<!-- Mobile nav drawer -->
<div class="nav-mobile-links" id="navMobileLinks">
    <a href="/">Inicio</a>
    <a href="/#tours">Tours</a>
    <a href="/#itinerario">Planifica</a>
    <a href="/#opiniones">Opiniones</a>
    <a href="/#contacto">Contacto</a>
</div>

<!-- ═══ HERO + FILTER BAR ════════════════════════════════════════════ -->
<div id="blogHero">
    <div class="blog-hero">
        <div class="blog-tag">Blog</div>
        <h1>Berlín,<br>sin filtros.</h1>
        <p>Historia, curiosidades y los rincones que no salen en las guías. Escritos desde las calles.</p>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" data-cat="todos"       onclick="filterPosts('todos',this)">Todos</button>
        <button class="filter-btn"        data-cat="historia"    onclick="filterPosts('historia',this)">Historia</button>
        <button class="filter-btn"        data-cat="naturaleza"  onclick="filterPosts('naturaleza',this)">Naturaleza</button>
        <button class="filter-btn"        data-cat="gastronomia" onclick="filterPosts('gastronomia',this)">Gastronomía</button>
        <button class="filter-btn"        data-cat="guias"       onclick="filterPosts('guias',this)">Guías prácticas</button>
    </div>
</div>

<!-- ═══ POSTS GRID ════════════════════════════════════════════════════ -->
<section class="posts-section" id="postsSection">
    <div class="posts-grid fade-up" id="postsGrid"></div>
</section>

<!-- ═══ FULL POST VIEW ═══════════════════════════════════════════════ -->
<div class="post-view" id="postView">
    <button class="post-view-back" onclick="closePost()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Volver al blog
    </button>
    <div id="postContent"></div>
</div>

<!-- ═══ FOOTER ════════════════════════════════════════════════════════ -->
<footer>
    <div class="footer-brand">Berlin <span>Joven</span>©</div>
    <div class="footer-copy">© 2025 Berlin Joven · berlinjoven.com</div>
</footer>

<!-- ═══ JAVASCRIPT ════════════════════════════════════════════════════ -->
<script>
// ════════════════════════════════════════════════════════════════════
//  POSTS — Para añadir un post nuevo, copia uno de estos objetos
//  y pégalo al principio del array. El más reciente va primero.
// ════════════════════════════════════════════════════════════════════
const POSTS = [
    {
        id: 'tiergarten-arboles',
        titulo: 'Los árboles que vieron todo',
        categoria: 'naturaleza',
        fecha: 'Marzo 2026',
        lectura: '4 min',
        extracto: 'Hay árboles en el Tiergarten que tienen más de 170 años. Han visto la Revolución de 1848, el Segundo Imperio, la destrucción de la Segunda Guerra Mundial y la reconstrucción de Berlín. Esto es lo que te contarían si pudieran hablar.',
        contenido: `
            <p>Hay un árbol en el Tiergarten que nació antes que Marx escribiera el Manifiesto Comunista. Antes de que existiera el Imperio Alemán. Antes de que Berlín se convirtiera en capital de algo. Si pudiera hablar, su historia llenaría varios libros.</p>

            <h2>1848: el año que lo cambió todo</h2>
            <p>Cuando estos árboles eran jóvenes, Berlín vivía uno de sus momentos más convulsos. La <strong>Revolución de Marzo de 1848</strong> sacó a los berlineses a las calles: querían democracia, libertad de prensa, unificación alemana. Ese mismo año, a pocas semanas de distancia, Karl Marx y Friedrich Engels publicaban en Londres el <em>Manifiesto Comunista</em>. Europa entera estaba en llamas.</p>

            <p>Los árboles del Tiergarten lo vieron todo desde su silencio.</p>

            <h2>La destrucción que casi nadie recuerda</h2>
            <p>De los más de 200.000 árboles que tenía el parque antes de la Segunda Guerra Mundial, <strong>solo sobrevivieron 700</strong>. No fue solo por los bombardeos aliados. Fue algo más duro: en el invierno de 1945-46, con Berlín en ruinas y sin calefacción, los propios berlineses talaron lo que quedaba para calentarse.</p>

            <blockquote>"Donde había jardines cuidados durante siglos, los berlineses plantaron patatas para sobrevivir. El Tiergarten se convirtió en un campo de cultivo."</blockquote>

            <p>Se calcula que llegaron a existir <strong>2.550 parcelas de huerto</strong> donde antes había bosque y senderos de paseo.</p>

            <h2>La reconstrucción: 250.000 árboles</h2>
            <p>El 17 de marzo de 1949, el Alcalde Ernst Reuter plantó un tilo. Era el primero de los <strong>250.000 árboles</strong> que se replanstarían entre 1949 y 1959. La mayoría fueron donados por ciudades y ciudadanos de toda Alemania.</p>

            <p>Y aquí viene el detalle que más me gusta: durante el <strong>Bloqueo Soviético de Berlín</strong> (1948-49), cuando la URSS cortó todas las vías de acceso a la ciudad, el puente aéreo americano que traía comida y carbón también trajo <em>plantones de árboles</em>. Hasta 200.000 saplings llegaron volando.</p>

            <p>Los berlineses decidieron que reconstruir el parque era tan urgente como reconstruir los edificios.</p>

            <h2>Descúbrelos tú mismo</h2>
            <p>Berlín tiene catalogados más de <strong>900.000 árboles</strong> en su Baumkataster (registro municipal de árboles). Puedes buscar cualquier árbol de la ciudad, ver su especie, su edad estimada y su ubicación exacta.</p>

            <p>Si quieres el link del mapa, comenta <strong>"Arbol"</strong> en mi último vídeo de TikTok o Instagram y te lo mando por DM.</p>
        `
    },
    {
        id: 'tiergarten-memoriales',
        titulo: 'El parque que nadie visita (y que debería)',
        categoria: 'historia',
        fecha: 'Marzo 2026',
        lectura: '5 min',
        extracto: 'Desde la Puerta de Brandeburgo, todo el mundo gira a la derecha o a la izquierda. Nadie mira hacia atrás. Pero detrás hay un parque con memoriales olvidados, esculturas del siglo XIX y el lugar exacto donde Reagan dijo sus cuatro palabras más famosas.',
        contenido: `
            <p>Cada vez que estoy con un grupo de turistas frente a la Puerta de Brandeburgo, me fijo en lo mismo: todo el mundo saca la foto, gira a derecha o izquierda, y sigue. Nadie mira hacia atrás.</p>

            <p>Hacia atrás está el <strong>Tiergarten</strong>. Y el Tiergarten guarda cosas que no aparecen en la mayoría de las guías.</p>

            <h2>El memorial que casi nadie conoce</h2>
            <p>A cinco minutos caminando desde la Puerta hay un estanque circular. En el centro, flotando, siempre hay una flor fresca. En la piedra, un poema.</p>

            <p>Es el <strong>Memorial a las Víctimas Sinti y Roma del Nacionalsocialismo</strong>. Conmemora el <em>Porrajmos</em> —la devoración, en lengua romaní— el genocidio nazi contra el pueblo gitano. Más de 500.000 personas asesinadas. Una cifra que rara vez aparece en los libros de historia que leímos en el colegio.</p>

            <blockquote>El poema grabado en la piedra se llama "Auschwitz" y lo escribió Santino Spinelli, un músico y poeta sinti que sobrevivió al campo. Lo encontrarás en el borde del estanque.</blockquote>

            <h2>Los tanques que son reales</h2>
            <p>Siguiendo el camino te encontrarás con el <strong>Memorial Soviético del Tiergarten</strong>. Dos tanques flanquean la entrada. No son réplicas decorativas: son tanques T-34 reales que participaron en la <strong>Batalla de Berlín</strong> en abril-mayo de 1945.</p>

            <p>Debajo están enterrados más de dos mil soldados del Ejército Rojo. Es uno de los tres memoriales soviéticos de Berlín, y el único que queda en lo que fue Berlín Occidental.</p>

            <h2>Cuatro palabras que cambiaron el mundo</h2>
            <p>El 12 de junio de 1987, Ronald Reagan se plantó frente a la Puerta de Brandeburgo y dijo: <em>"Mr. Gorbachev, tear down this wall."</em></p>

            <p>El lugar exacto desde donde habló está marcado. Y la ironía histórica es que el Muro no cayó ese día —cayó dos años después, en noviembre de 1989— pero el discurso ya había cambiado el ambiente. A veces las palabras van por delante de los hechos.</p>

            <h2>Der Rufer: el que llama</h2>
            <p>Para terminar el recorrido, busca <strong>Der Rufer</strong> —El que llama— una escultura de Gerhard Marcks de 1967. Una figura humana con los brazos extendidos hacia el cielo, la cabeza inclinada hacia atrás.</p>

            <p>Marcks la creó en plena Guerra Fría, en una ciudad dividida por un muro. La figura llama, convoca, pide que salgas. Para mí es el símbolo perfecto del Tiergarten: un parque que lleva décadas esperando que la gente deje de ignorarlo.</p>
        `
    },
];

// ════════════════════════════════════════════════════════════════════
//  Renderizado — no hace falta tocar nada de aquí abajo
// ════════════════════════════════════════════════════════════════════
let currentFilter = 'todos';

function renderPosts(filter) {
    const grid = document.getElementById('postsGrid');
    const filtered = filter === 'todos' ? POSTS : POSTS.filter(p => p.categoria === filter);

    if (filtered.length === 0) {
        grid.innerHTML = `<div style="padding:60px 32px;color:var(--text3);font-size:14px;grid-column:1/-1;">
            Próximamente hay más artículos en esta categoría.
        </div>`;
        return;
    }

    grid.innerHTML = filtered.map(post => `
        <div class="post-card" onclick="openPost('${post.id}')">
            <div class="post-cat">${post.categoria.toUpperCase()}</div>
            <div class="post-title">${post.titulo}</div>
            <p class="post-excerpt">${post.extracto}</p>
            <div class="post-meta">
                <span>${post.fecha}</span>
                <span class="post-read">
                    ${post.lectura} lectura
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </span>
            </div>
        </div>
    `).join('');
}

function filterPosts(cat, btn) {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPosts(cat);
}

function openPost(id) {
    const post = POSTS.find(p => p.id === id);
    if (!post) return;

    document.getElementById('postContent').innerHTML = `
        <div class="post-view-cat">${post.categoria.toUpperCase()}</div>
        <h1>${post.titulo}</h1>
        <div class="post-view-meta">${post.fecha} &nbsp;·&nbsp; ${post.lectura} de lectura</div>
        <div class="post-view-body">${post.contenido}</div>
    `;

    document.getElementById('postsSection').classList.add('hidden');
    document.getElementById('blogHero').style.display = 'none';
    document.getElementById('postView').classList.add('visible');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closePost() {
    document.getElementById('postView').classList.remove('visible');
    document.getElementById('postsSection').classList.remove('hidden');
    document.getElementById('blogHero').style.display = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
renderPosts('todos');

// ════════════════════════════════════════════════════════════════════
//  NEW UI ENHANCEMENTS
// ════════════════════════════════════════════════════════════════════

document.documentElement.classList.add('js-ready');

// ── Hamburger (mobile) ─────────────────────────────────────────────
(function() {
    const hamburger    = document.getElementById('navHamburger');
    const mobileLinks  = document.getElementById('navMobileLinks');
    if (!hamburger || !mobileLinks) return;

    hamburger.addEventListener('click', () => {
        const isOpen = mobileLinks.classList.toggle('open');
        hamburger.classList.toggle('open', isOpen);
        hamburger.setAttribute('aria-expanded', String(isOpen));
        hamburger.setAttribute('aria-label', isOpen ? 'Cerrar menú' : 'Abrir menú');
    });

    mobileLinks.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => {
            mobileLinks.classList.remove('open');
            hamburger.classList.remove('open');
            hamburger.setAttribute('aria-expanded', 'false');
        });
    });

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && mobileLinks.classList.contains('open')) {
            mobileLinks.classList.remove('open');
            hamburger.classList.remove('open');
            hamburger.setAttribute('aria-expanded', 'false');
            hamburger.focus();
        }
    });
})();

// ── IntersectionObserver: fade-up ─────────────────────────────────
(function() {
    const fadeEls = document.querySelectorAll('.fade-up');
    const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                e.target.classList.add('is-visible');
                obs.unobserve(e.target);
            }
        });
    }, { threshold: 0.08 });
    fadeEls.forEach(el => obs.observe(el));
})();
</script>
